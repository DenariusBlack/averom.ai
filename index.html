<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Averom | AI Supplier Risk Intelligence</title>
    <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
          .container { max-width: 700px; width: 100%; }
          h1 { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
          .subtitle { color: #888; margin-bottom: 2rem; font-size: 1rem; }
          .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 2rem; }
          label { display: block; font-size: 0.9rem; color: #aaa; margin-bottom: 0.5rem; }
          input { width: 100%; padding: 0.75rem 1rem; background: #0f0f1a; border: 1px solid #3a3a5a; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
          input:focus { border-color: #6c63ff; }
          button { margin-top: 1rem; width: 100%; padding: 0.85rem; background: #6c63ff; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
          button:hover { background: #5a52d5; }
          button:disabled { background: #3a3a5a; cursor: not-allowed; }
          #result { margin-top: 1.5rem; display: none; }
          #result h2 { font-size: 1.1rem; color: #aaa; margin-bottom: 1rem; }
          pre { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 1rem; overflow-x: auto; white-space: pre-wrap; font-size: 0.85rem; color: #c0c0d0; line-height: 1.6; }
          .error { color: #ff6b6b; margin-top: 1rem; font-size: 0.9rem; display: none; }
          .spinner { display: none; text-align: center; margin-top: 1rem; color: #6c63ff; }
        </style>
  </head>
  <body>
      <div class="container">
            <h1>Averom</h1>
          <p class="subtitle">AI Supplier Risk Intelligence for Amazon Sellers</p>p>
          <div class="card">
                <label for="supplier">Supplier Domain or Company Name</label>label>
                <input type="text" id="supplier" placeholder="e.g. supplierdomain.com" />
                <button id="analyzeBtn" onclick="analyze()">Analyze Supplier</button>button>
                <div class="spinner" id="spinner">Analyzing... this may take a moment.</div>div>
                <div class="error" id="error"></div>div>
                <div id="result">
                        <h2>Risk Intelligence Report</h2>
                        <pre id="output"></pre>pre>
                </div>div>
          </div>div>
      </div>div>
    <script>
          async function analyze() {
                  const supplier = document.getElementById('supplier').value.trim();
                  if (!supplier) return;
                  const btn = document.getElementById('analyzeBtn');
                  const spinner = document.getElementById('spinner');
                  const error = document.getElementById('error');
                  const result = document.getElementById('result');
                  const output = document.getElementById('output');
                  btn.disabled = true;
                  spinner.style.display = 'block';
                  error.style.display = 'none';
                  result.style.display = 'none';
                  try {
                            const res = await fetch('/api/analyze', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ supplier })
                            });
                            const data = await res.json();
                            if (!res.ok) throw new Error(data.error || 'Analysis failed');
                            output.textContent = JSON.stringify(data, null, 2);
                            result.style.display = 'block';
                  } catch (e) {
                            error.textContent = e.message;
                            error.style.display = 'block';
                  } finally {
                            btn.disabled = false;
                            spinner.style.display = 'none';
                  }
          }
          document.getElementById('supplier').addEventListener('keydown', e => {
                  if (e.key === 'Enter') analyze();
          });
    </script>
  </body>
</html>html>
    </script></h2></h1>
  </body>
    </style></title>
  </head>
