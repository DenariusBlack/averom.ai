<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Averom — AI Supplier Risk Intelligence</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0c1018;
color:#e8e4d8;
margin:0;
padding:0;
text-align:center
}

.hero{
padding:120px 20px 40px
}

h1{
font-weight:300;
font-size:46px;
margin-bottom:10px
}

input{
padding:12px;
font-size:16px;
width:260px
}

button{
padding:12px 18px;
font-size:14px;
cursor:pointer;
margin-left:6px
}

.status{
margin-top:15px;
color:#c9a84c
}

.error{
margin-top:10px;
color:#c0665a
}

.report{
display:none;
max-width:800px;
margin:40px auto;
text-align:left;
border:1px solid #333;
padding:30px;
background:#141922
}

.score{
font-size:36px;
margin-bottom:10px
}

.section{
margin-top:25px
}

.bar-track{
height:10px;
background:#2a2f3a;
margin-top:6px;
margin-bottom:10px
}

.bar-fill{
height:10px
}

.flag{
color:#ff6b6b;
margin-bottom:6px
}

.step{
margin-bottom:6px
}

</style>

</head>

<body>

<div class="hero">

<h1>Averom</h1>

<p>AI supplier verification for ecommerce sellers</p>

<input id="supplierInput" placeholder="supplierdomain.com">

<button id="analyzeBtn">Analyze</button>

<div id="statusText" class="status"></div>

<div id="errorBar" class="error"></div>

</div>

<div id="report" class="report">

<div class="score" id="scoreNum"></div>

<div class="section">
<b>Company</b>
<div id="reportCompany"></div>
</div>

<div class="section">
<b>Website</b>
<div id="reportDomain"></div>
</div>

<div class="section">
<b>Verdict</b>
<div id="verdictLabel"></div>
</div>

<div class="section">
<b>Summary</b>
<div id="verdictDesc"></div>
</div>

<div class="section">
<b>Overview</b>
<div id="overview"></div>
</div>

<div class="section">
<b>Risk Categories</b>
<div id="categories"></div>
</div>

<div class="section">
<b>Red Flags</b>
<div id="flags"></div>
</div>

<div class="section">
<b>Recommended Due Diligence</b>
<div id="steps"></div>
</div>

<div class="section">
<b>Conclusion</b>
<div id="conclusion"></div>
</div>

</div>

<script>

const STATUS=[
'Scanning domain registration',
'Checking business registries',
'Searching fraud databases',
'Analyzing review patterns',
'Checking Amazon compliance signals',
'Cross referencing data',
'Calculating risk score',
'Generating intelligence report'
];

let statusTimer;

function startStatus(){
let i=0
const el=document.getElementById("statusText")
el.innerText=STATUS[0]

statusTimer=setInterval(()=>{
i=(i+1)%STATUS.length
el.innerText=STATUS[i]
},2000)
}

function stopStatus(){
clearInterval(statusTimer)
document.getElementById("statusText").innerText=""
}

function barColor(score){
if(score<=3)return "#5A8A5A"
if(score<=6)return "#C9A84C"
return "#C0665A"
}

function render(data){

document.getElementById("reportCompany").innerText=data.company_name
document.getElementById("reportDomain").innerText=data.website

document.getElementById("scoreNum").innerText=
"Risk Score: "+Number(data.overall_score).toFixed(1)+"/10"

document.getElementById("verdictLabel").innerText=data.verdict
document.getElementById("verdictDesc").innerText=data.verdict_summary

document.getElementById("overview").innerHTML=`
Company: ${data.company_name || "-"}<br>
Address: ${data.address || "-"}<br>
Domain Age: ${data.domain_age || "-"}<br>
Category: ${data.business_category || "-"}
`

document.getElementById("categories").innerHTML=(data.categories||[]).map(c=>{

const pct=Math.round((c.score/10)*100)
const col=barColor(c.score)

return `
<div>
<b>${c.name}</b> (${c.score}/10)
<div class="bar-track">
<div class="bar-fill" style="width:${pct}%;background:${col}"></div>
</div>
<div>${c.explanation}</div>
</div>
`

}).join("")

document.getElementById("flags").innerHTML=
(data.red_flags||[]).map(f=>`<div class="flag">⚠ ${f}</div>`).join("")

document.getElementById("steps").innerHTML=
(data.due_diligence_steps||[]).map(s=>`<div class="step">• ${s}</div>`).join("")

document.getElementById("conclusion").innerText=data.conclusion

document.getElementById("report").style.display="block"

}

async function runAnalysis(){

const raw=document.getElementById("supplierInput").value.trim()

if(!raw)return

const supplier=raw.replace(/^https?:\/\//i,"").replace(/\/.*$/,"")

const btn=document.getElementById("analyzeBtn")
const err=document.getElementById("errorBar")

btn.disabled=true
err.innerText=""
document.getElementById("report").style.display="none"

startStatus()

try{

const res=await fetch("/api/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({supplier})
})

const data=await res.json()

if(!res.ok){
throw new Error(data.error || "Analysis failed")
}

stopStatus()

render(data)

}catch(e){

stopStatus()

err.innerText="Error: "+e.message

}

btn.disabled=false

}

document.getElementById("analyzeBtn")
.addEventListener("click",runAnalysis)

document.getElementById("supplierInput")
.addEventListener("keydown",e=>{
if(e.key==="Enter")runAnalysis()
})

</script>

</body>
</html>
